name: Run private claudeaction

on:
  repository_dispatch:
    types: [run_private_claudeaction]

permissions:
  contents: read

concurrency:
  group: private-claudeaction
  cancel-in-progress: false

jobs:
  run-private-claudeaction:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
      CLAUDE_ACTION_PROVIDERS_JSON: ${{ secrets.CLAUDE_ACTION_PROVIDERS_JSON }}
      IMAGE_PROVIDERS_JSON: ${{ secrets.IMAGE_PROVIDERS_JSON }}
      IMAGE_PROVIDER_BASE_URL: ${{ secrets.IMAGE_PROVIDER_BASE_URL }}
      IMAGE_PROVIDER_API_KEY: ${{ secrets.IMAGE_PROVIDER_API_KEY }}
      IMAGE_PROVIDER_MODEL: ${{ vars.IMAGE_PROVIDER_MODEL }}
      IMAGE_GENERATION_ENABLED: ${{ vars.IMAGE_GENERATION_ENABLED }}
      IMAGE_PROVIDER_TIMEOUT_SECONDS: ${{ vars.IMAGE_PROVIDER_TIMEOUT_SECONDS }}
      IMAGE_PROVIDER_ASYNC_MODE: ${{ vars.IMAGE_PROVIDER_ASYNC_MODE }}
      IMAGE_PROVIDER_ASYNC_POLL_INTERVAL_SECONDS: ${{ vars.IMAGE_PROVIDER_ASYNC_POLL_INTERVAL_SECONDS }}
      IMAGE_MAX_IMAGES_PER_ARTICLE: ${{ vars.IMAGE_MAX_IMAGES_PER_ARTICLE }}
      IMAGE_MAX_PARALLELISM: ${{ vars.IMAGE_MAX_PARALLELISM }}
      IMAGE_RESPONSE_FORMAT: ${{ vars.IMAGE_RESPONSE_FORMAT }}
      IMAGE_STRICT: ${{ vars.IMAGE_STRICT }}
      SITE_WINDOW_DAYS: ${{ vars.SITE_WINDOW_DAYS }}
      ARTICLE_IMAGE_BASE_URL: ${{ vars.ARTICLE_IMAGE_BASE_URL }}
      CLAUDE_ACTION_POSTPROCESS: ${{ vars.CLAUDE_ACTION_POSTPROCESS }}
      CLAUDE_ACTION_POSTPROCESS_STRICT: ${{ vars.CLAUDE_ACTION_POSTPROCESS_STRICT }}
      POSTPROCESS_STRICT: ${{ vars.POSTPROCESS_STRICT }}
      POSTPROCESS_SKIP_EXISTING: ${{ vars.POSTPROCESS_SKIP_EXISTING }}
    steps:
      - name: Checkout runner repository
        uses: actions/checkout@v6.0.2

      - name: Run private claudeaction
        run: node .github/scripts/run_private_claudeaction.mjs
